name: Deploy VT Employee Bot

on:
  push:
    branches: [main]

jobs:
  # Path-based change detection (2026-07-09) — decides which of the 3 jobs
  # below actually need to run for this push. Uses dorny/paths-filter rather
  # than a native on.push.paths trigger: on.push.paths can only gate whether
  # the ENTIRE workflow fires, not which jobs run within one triggered run —
  # and this workflow needs 3 independently-conditioned jobs sharing one
  # push event (a docs-only push must still evaluate to "run nothing", not
  # "don't trigger the workflow at all", so a run still appears in the Actions
  # tab showing exactly what was skipped and why).
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend:   ${{ steps.filter.outputs.backend }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      e2e:       ${{ steps.filter.outputs.e2e }}
      workflow:  ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'package.json'
              - 'package-lock.json'
            dashboard:
              - 'dashboard/**'
            # E2E exercises the real API against a live URL, so it also needs
            # to run when backend routes/services change, not just when the
            # dashboard does — backend-only utils/config tweaks don't reach
            # any route surface E2E would catch, so they're deliberately
            # excluded here even though they match `backend` above.
            e2e:
              - 'dashboard/**'
              - 'src/routes/**'
              - 'src/services/**'
            # A CI config change should prove the full pipeline still works —
            # ORed into every job's `if` below, forcing all 3 to run
            # regardless of what else did or didn't change.
            workflow:
              - '.github/**'
          # No `docs` filter is needed: docs/** and root-level *.md files
          # don't match any pattern above, so a docs-only push naturally
          # leaves backend/dashboard/e2e/workflow all `false` and every job
          # below skips — that's the "no jobs run" case, not a separate rule.

  deploy-backend:
    name: Backend → AWS Lambda
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflow == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install all dependencies (including dev for tests)
        run: npm install

      - name: Run tests
        run: npm test

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Verify critical modules present
        run: |
          ls node_modules/serverless-http || { echo "❌ serverless-http missing from node_modules — aborting"; exit 1; }
          echo "✅ serverless-http present"

      - name: Package Lambda zip
        run: |
          zip -r deployment.zip src/ package.json node_modules/ \
            --exclude "*.map" \
            --exclude "node_modules/.cache/*" \
            --exclude "node_modules/aws-sdk/dist-tools/*"

      - name: Upload zip to S3
        run: |
          aws s3 cp deployment.zip s3://apforce-wa-media/vt-employee-bot-api.zip
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1

      - name: Deploy to Lambda from S3
        run: |
          aws lambda update-function-code \
            --function-name vt-employee-bot-api \
            --s3-bucket apforce-wa-media \
            --s3-key vt-employee-bot-api.zip \
            --region ap-south-1
          aws lambda update-function-code \
            --function-name vt-employee-bot-ws \
            --s3-bucket apforce-wa-media \
            --s3-key vt-employee-bot-api.zip \
            --region ap-south-1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1

      - name: Wait for Lambda to be ready
        run: |
          aws lambda wait function-updated \
            --function-name vt-employee-bot-api \
            --region ap-south-1
          aws lambda wait function-updated \
            --function-name vt-employee-bot-ws \
            --region ap-south-1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1

      - name: Ensure campaign scheduler EventBridge rule exists
        continue-on-error: true
        run: |
          RULE_ARN=$(aws events put-rule \
            --name vt-employee-bot-campaign-scheduler \
            --schedule-expression "rate(5 minutes)" \
            --state ENABLED \
            --region ap-south-1 \
            --query 'RuleArn' --output text)
          FUNCTION_ARN=$(aws lambda get-function \
            --function-name vt-employee-bot-api \
            --region ap-south-1 \
            --query 'Configuration.FunctionArn' --output text)
          aws events put-targets \
            --rule vt-employee-bot-campaign-scheduler \
            --region ap-south-1 \
            --targets "Id=1,Arn=$FUNCTION_ARN"
          aws lambda add-permission \
            --function-name vt-employee-bot-api \
            --statement-id EventBridgeCampaignScheduler \
            --action lambda:InvokeFunction \
            --principal events.amazonaws.com \
            --source-arn "$RULE_ARN" \
            --region ap-south-1 2>/dev/null || true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1

      - name: Smoke test
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.viirtrading.com/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed!"
            exit 1
          fi
          echo "✅ Lambda is healthy"

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [changes, deploy-backend]
    # always() makes GitHub actually evaluate this expression instead of
    # auto-skipping because deploy-backend didn't run — the explicit
    # result-check right after is what makes that safe: this still runs when
    # deploy-backend was cleanly skipped (dashboard-only push, still needs
    # E2E per the `e2e` filter above), but correctly stays skipped if
    # deploy-backend genuinely failed. "Skipped" here reads as skipped in the
    # Actions UI, never as a failed check — no required-status-check on main
    # depends on this passing (continue-on-error: true below, unchanged).
    if: |
      always() &&
      (needs.changes.outputs.e2e == 'true' || needs.changes.outputs.workflow == 'true') &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')
    continue-on-error: true
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npm run test:e2e
        env:
          CI: true
          NEXT_PUBLIC_API_URL: https://api.viirtrading.com
          E2E_BASE_URL: http://localhost:3001
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          E2E_TOTP_SECRET: ${{ secrets.E2E_TOTP_SECRET }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: dashboard/playwright-report/
          retention-days: 7

  deploy-dashboard:
    name: Dashboard → Vercel
    runs-on: ubuntu-latest
    needs: [changes, deploy-backend]
    # Same skipped-equals-success pattern as e2e above — runs on a
    # dashboard-only push (deploy-backend cleanly skipped) but stays skipped
    # if deploy-backend genuinely failed.
    if: |
      always() &&
      (needs.changes.outputs.dashboard == 'true' || needs.changes.outputs.workflow == 'true') &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
