name: Deploy VT Employee Bot

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Backend → AWS Lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install all dependencies (including dev for tests)
        run: npm install

      - name: Run tests
        run: npm test

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Verify critical modules present
        run: |
          ls node_modules/serverless-http || { echo "❌ serverless-http missing from node_modules — aborting"; exit 1; }
          echo "✅ serverless-http present"

      - name: Package Lambda zip
        run: |
          zip -r deployment.zip src/ package.json node_modules/ \
            --exclude "*.map" \
            --exclude "node_modules/.cache/*" \
            --exclude "node_modules/aws-sdk/dist-tools/*"

      - name: Upload zip to S3
        run: |
          aws s3 cp deployment.zip s3://apforce-wa-media/vt-employee-bot-api.zip
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1

      - name: Deploy to Lambda from S3
        run: |
          aws lambda update-function-code \
            --function-name vt-employee-bot-api \
            --s3-bucket apforce-wa-media \
            --s3-key vt-employee-bot-api.zip \
            --region ap-south-1
          aws lambda update-function-code \
            --function-name vt-employee-bot-ws \
            --s3-bucket apforce-wa-media \
            --s3-key vt-employee-bot-api.zip \
            --region ap-south-1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1

      - name: Wait for Lambda to be ready
        run: |
          aws lambda wait function-updated \
            --function-name vt-employee-bot-api \
            --region ap-south-1
          aws lambda wait function-updated \
            --function-name vt-employee-bot-ws \
            --region ap-south-1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1

      - name: Smoke test
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.viirtrading.com/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed!"
            exit 1
          fi
          echo "✅ Lambda is healthy"

  deploy-dashboard:
    name: Dashboard → Vercel
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
